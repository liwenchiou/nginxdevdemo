# 運行 Nginx 的使用者
user  nginx;
# 自動設定 worker 行程數（通常等於 CPU 核心數）
worker_processes  auto;

# 錯誤日誌路徑與層級設定
error_log  /var/log/nginx/error.log notice;
# Nginx 行程的 PID 檔案路徑
pid        /var/run/nginx.pid;

# Events 模組設定：處理連線的相關設定
events {
    # 每個 worker 行程允許的最大同時連線數
    worker_connections  1024;
}

# HTTP 模組設定：全域 HTTP 伺服器設定
http {
    # 載入副檔名與 MIME Type 的對應表
    include       /etc/nginx/mime.types;
    # 預設的 MIME Type (當找不到對應的型別時使用)
    default_type  application/octet-stream;

    # 定義存取日誌的格式 (命名為 main)
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    # 存取日誌路徑，並套用剛剛定義的 main 格式
    access_log  /var/log/nginx/access.log  main;

    # 開啟 sendfile 系統呼叫，提升靜態檔案傳輸效率
    sendfile        on;
    # tcp_nopush 通常搭配 sendfile 使用，等封包滿了再傳送，減少網路重疊
    #tcp_nopush     on;
    
    # 客戶端與伺服器保持連線的逾時時間（秒）
    keepalive_timeout  65;

    # 載入 gzip 壓縮相關的設定片段
    include /etc/nginx/snippets/gzip.conf;

    # 載入 conf.d 目錄下所有的虛擬主機 (Virtual Host) 設定檔
    include /etc/nginx/conf.d/*.conf;
}
