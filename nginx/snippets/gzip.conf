# 開啟 gzip 壓縮功能
gzip on;
# 針對舊版 IE (IE6 及更早版本) 停用 gzip 壓縮，避免相容性問題
gzip_disable "msie6";

# 在回應標頭中加上 Vary: Accept-Encoding，讓代理伺服器根據是否支援壓縮來快取
gzip_vary on;
# 允許對代理請求（如反向代理）的回應進行壓縮
gzip_proxied any;
# 設定 gzip 壓縮等級，範圍 1-9 (建議設定 6，以取得壓縮率與 CPU 消耗的平衡)
gzip_comp_level 6;
# 設定用於壓縮的緩衝區數量與大小
gzip_buffers 16 8k;
# 設定支援 gzip 壓縮的最低 HTTP 版本
gzip_http_version 1.1;
# 指定需要進行壓縮的檔案類型 (MIME types)
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
