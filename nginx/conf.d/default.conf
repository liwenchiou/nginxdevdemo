# 這是 Nginx 主要監聽 80 port (HTTP) 的伺服器區塊設定
server {
    listen 80;
    server_name localhost;

    # 定義 Nginx 的根目錄，並指定網頁首頁的檔名
    # /usr/share/nginx/html 會在 docker-compose 裡面對應到我們專案的 frontend 資料夾
    root /usr/share/nginx/html;
    index index.html;

    # 針對所有的 /api 請求進行攔截與反向代理
    location /api/ {
        # 將流量轉發給我們在 upstreams.conf 裡面定義的 api_servers 群組
        proxy_pass http://api_servers;

        # 這裡引入我們事先寫好的標準化代理標頭檔，確保能正確將客戶端的真實 IP 傳遞給後端
        include /etc/nginx/snippets/proxy_params.conf;

        # 高可用性容錯機制 (High Availability & Failover) 核心設定：
        # proxy_next_upstream 會告訴 Nginx，如果遇到以下這幾種錯誤情況：
        # error: 連線錯誤、timeout: 連線超時、invalid_header: 收到無效標頭
        # http_500、http_502、http_503、http_504: 收到伺服器內部錯誤代碼
        # 就「立刻」把這個請求轉交給群組內的下一台伺服器，讓使用者完全感受不到有伺服器死掉。
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;

        # 解決容器停止時卡住的問題：
        # Nginx 預設的 proxy_connect_timeout 是 60 秒，當 api1 停機時會乾等 60 秒才判定 timeout 並轉交給 api2。
        # 我們將連線超時縮短為 2 秒，這樣 Nginx 就能迅速發現伺服器沒反應，馬上切換給下一台。
        proxy_connect_timeout 2s;
        proxy_send_timeout 2s;
        proxy_read_timeout 5s;
    }

    # 其他所有不是 /api 的請求 (也就是前端的靜態檔案 HTML, JS, CSS 等等)
    # try_files 會先嘗試尋找實體檔案 ($uri)，找不到的話會找對應的資料夾 ($uri/)，
    # 如果真的都找不到，就回傳一個 404 錯誤 (這個對於 Single Page Application 很實用，也可以換成回傳 index.html)
    location / {
        try_files $uri $uri/ =404;
    }
}
